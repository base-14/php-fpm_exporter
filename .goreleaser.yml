version: 2

builds:
  - binary: php-fpm_exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: ['binary']
  - id: targz
    formats: ['tar.gz']

changelog:
  filters:
    exclude:
      - '^docs:'
